run:
  seed: 42
  device: cuda
  use_amp: false

data:
  data_root: c:/Users/21927/Desktop/测试2/code/data/zip_extracted
  normalization: median_ratio_log1p
  min_samples_per_tissue: 25
  top_hvgs: 4500
  add_rank_features: false
  add_pathway_scores: true
  add_cell_scores: true

split:
  mode: random
  test_fraction: 0.2
  val_fraction: 0.15

model:
  architecture: disease_aware_no_tissue
  hidden_dim: 512
  shared_dim: 64
  tissue_dim: 24
  disease_dim: 12
  nuisance_dim: 8
  dropout: 0.10
  grl_lambda: 0.3
  n_age_experts: 3
  encoder_layers: 3
  use_sex_condition: true
  use_joint_residual_branch: true
  residual_branch_hidden_dim: 192
  use_tissue_in_age_head: false
  use_disease_in_age_head: false
  targeted_tissue_residual_tissues: []
  use_separate_targeted_tissue_heads: false

optim:
  learning_rate: 0.0007
  weight_decay: 0.00003
  batch_size: 128
  max_epochs: 320
  patience: 55
  age_only_finetune_epochs: 45
  age_only_lr_scale: 0.08
  selection_metric: val_mae
  lr_scheduler_patience: 12
  lr_scheduler_factor: 0.5
  min_learning_rate: 0.000005

loss:
  feature_weight: 0.0
  health_weight: 0.05
  disease_weight: 0.0
  tissue_weight: 0.0
  nuisance_batch_weight: 0.0
  adversarial_batch_weight: 0.0
  sex_weight: 0.01
  age_expert_supervision_weight: 0.05
  residual_weight: 0.0
  monotonic_weight: 0.01
  orthogonality_weight: 0.0
  deviation_weight: 0.0
  disease_age_weight: 1.0

focused_reweight:
  enabled: false

residual_calibration:
  enabled: true
  top_numeric_features: 48
  min_improvement: 0.0
  candidate_models:
    - extra_trees_ultra
    - extra_trees_deep
    - ridge_alpha_0p3
  enable_pairwise_blends: true
  blend_weights:
    - 0.60
    - 0.67
    - 0.75
    - 0.80
    - 0.90
  stage2_enabled: false
  targeted_group_rules: []
  min_group_train_samples: 8
  min_group_val_samples: 3
  min_group_improvement: 0.05

ablation:
  reuse_full_from_dir: c:/Users/21927/Desktop/测试2/process/outputs/mainline_health_binary_agefirst_v1_run_01
